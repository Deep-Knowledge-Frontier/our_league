<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/logo192.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#2D336B" />
    <!-- PWA: 홈 화면 추가 시 풀스크린 + 상태바 스타일 -->
    <!-- 🆕 모던 표준 (Chrome/Android) — apple-* 보다 먼저 선언 -->
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- iOS Safari (구버전 호환용) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="우리들의 리그" />
    <!-- Android PWA: 자동 theme-color는 위의 theme-color 사용 -->
    <meta name="description" content="투표부터 MVP까지, 우리 팀의 모든 것 - 우리들의 리그" />

    <!-- Open Graph (카카오톡, 페이스북 등 링크 미리보기) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="우리들의 리그" />
    <meta property="og:description" content="투표부터 MVP까지, 우리 팀의 모든 것. 출석투표 · 팀편성 · 스코어기록 · 선수순위" />
    <meta property="og:image" content="https://uri-league.web.app/og-image.png" />
    <meta property="og:url" content="https://uri-league.web.app" />

    <!-- 카카오톡 전용 -->
    <meta property="og:site_name" content="우리들의 리그" />

    <!-- 트위터 카드 -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="우리들의 리그" />
    <meta name="twitter:description" content="투표부터 MVP까지, 우리 팀의 모든 것" />
    <meta name="twitter:image" content="https://uri-league.web.app/og-image.png" />

    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>우리들의 리그</title>
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
  </head>

    <div id="root"></div>
  </body>
